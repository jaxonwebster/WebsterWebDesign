<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote - Webster Web Design</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="logo"><a href="index.html">Webster<span>WebDesign</span></a></div>
            <button class="menu-toggle" id="mobile-toggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="mywork.html">Our Work</a></li>
                <li><a href="endorsements.html">Testimonials</a></li>
                <li><a href="quote.html" class="cta-btn">Get a Quote</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <div class="section-inner">
                <div class="reveal">
                    <h1 class="section-title">Let's Build Something Great</h1>
                    <p class="section-subtitle">Tell us about your project objectives and let's structure a custom layout solution.</p>
                </div>

                <div class="form-container reveal" style="transition-delay: 0.1s;">
                    <form action="#" method="POST">
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" name="name" required placeholder="John Doe">
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required placeholder="john@example.com">
                        </div>

                        <div class="form-group">
                            <label for="package">Select Package Scope</label>
                            <select id="package" name="package">
                                <option value="basic">Basic Tier — $1,000</option>
                                <option value="intermediate">Intermediate Tier — $2,500</option>
                                <option value="advanced">Advanced Tier — $5,000</option>
                                <option value="management">Monthly Management Only — $150/mo</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="message">Project Brief & Details</label>
                            <textarea id="message" name="message" rows="5" placeholder="Describe your business goal and design vision..."></textarea>
                        </div>

                        <button type="submit" class="cta-btn" style="border: none; width: 100%; padding: 1rem; cursor: pointer; font-size: 1rem;">Submit Request</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Webster Web Design. All rights reserved.</p>
    </footer>

    <script src="styles/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const packageParam = urlParams.get('package');
            if (packageParam) {
                const selectDropdown = document.getElementById('package');
                if (selectDropdown && selectDropdown.querySelector(`option[value="${packageParam}"]`)) {
                    selectDropdown.value = packageParam;
                }
            }
        });
    </script>
</body>
</html>
